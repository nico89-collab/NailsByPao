<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | Nails By Pao</title>
    <meta name="description" content="Ingreso seguro al panel de administración de turnos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="login.js?v=20260323" defer></script>
  </head>
  <body class="login-page" data-page="login">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-head">
          <img class="logo-mark" src="imagenes/perfil.jpg?v=2" alt="Logo Nails By Pao" width="40" height="40" decoding="async" />
          <h1>Acceso Administración</h1>
          <p>Ingresá para gestionar turnos de Nails By Pao.</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <label for="usuario">Usuario</label>
          <input id="usuario" type="text" placeholder="admin" autocomplete="username" required />

          <label for="password">Contraseña</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="1234" autocomplete="current-password" required />
            <button id="togglePassword" type="button" class="toggle-password">Mostrar</button>
          </div>

          <button class="btn btn-primary" type="submit">Ingresar</button>
          <p id="loginFeedback" class="booking-feedback" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </body>
</html>
